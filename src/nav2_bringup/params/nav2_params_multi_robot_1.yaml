controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]
    controller_frequency: 30.0 #20 working
    use_sim_time: true
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.25
      stateful: true
      
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.5  # reduced from 1.0: less overshoot with 100 Hz physics
      max_angular_accel: 1.2              # reduced from 2.5: gentler ramp, less bang-bang oscillation
      simulate_ahead_time: 0.5           # reduced from 1.0: shorter lookahead is more accurate at 100 Hz
      rotate_to_goal_heading: true #false

      # Main plugin
      # plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.3 #0.2
      vy_std: 0.0
      wz_std: 0.1 # 0.4 #try reducing it further
      vx_max: 1.0 #1.5 #1.0 #0.75 # 0.5
      vx_min: -1.0 # -0.35
      vy_max: 0.0 # 0.5
      # Try changing this
      wz_max: 1.0 #2.5 #1.3 #2.5 # 1.9 # reducing this maked the robot turn reallt slow durign the end of the goal
      ax_max: 0.5 #4.0 #3.0
      ax_min: -0.5 #-3.0
      ay_max: 0.0 #3.0
      az_max: 1.0 #3.5
      az_min: -1.0 #3.5
      iteration_count: 1
      prune_distance: 1.5 #1.7 original
      transform_tolerance: 0.1
      temperature: 0.3 # No changes for now
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        trajectory_topic: trajectories
      AckermannConstraints:
        min_turning_r: 0.2
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 7.0 #10.0 #5.0
        threshold_to_consider: 0.5
      # ObstaclesCritic:
      #   enabled: true
      #   cost_power: 1
      #   repulsion_weight: 1.5
      #   critical_weight: 20.0
      #   consider_footprint: false
      #   collision_cost: 10000.0
      #   collision_margin_distance: 0.1
      #   near_goal_distance: 0.5
      #   inflation_radius: 0.55 # (only in Humble)
      #   cost_scaling_factor: 10.0 # (only in Humble)
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 253.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0 #2.0 ?
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0 # 1.5 ?
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0 #6.0 #2.0 ?
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      # VelocityDeadbandCritic:
      #   enabled: true
      #   cost_power: 1
      #   cost_weight: 35.0
      #   deadband_velocities: [0.05, 0.05, 0.05]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0


local_costmap:
  local_costmap: 
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: r1/map
      robot_base_frame: r1_base_footprint
      use_sim_time: true
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      robot_radius: 0.3
      lethal_cost_threshold: 100
      transform_tolerance: 0.5
      plugins: ["obstacle_layer", "static_layer", "virtual_obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          # IMPORTANT: Use absolute topic path with leading slash
          topic: /r1/scan
          # Sensor frame - must match the frame_id in the LaserScan message
          sensor_frame: ""  # Empty means use frame from message
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_range: 2.5
          raytrace_range: 6.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.75
          obstacle_min_range: 0.3
          inf_is_valid: True  # IMPORTANT: Handle inf values from hallucination
          observation_persistence: 0.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.55

      virtual_obstacle_layer:
        plugin: "my_virtual_obstacle_layer::VirtualObstacleLayer"
        enabled: true

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: r1/map
      robot_base_frame: r1_base_footprint
      use_sim_time: true
      robot_radius: 0.3
      lethal_cost_threshold: 100
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.5
      plugins: ["static_layer", "obstacle_layer", "virtual_obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          # IMPORTANT: Use absolute topic path with leading slash
          topic: /r1/scan
          sensor_frame: ""
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_range: 2.5
          raytrace_range: 6.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.75
          obstacle_min_range: 0.3
          inf_is_valid: True
          observation_persistence: 0.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.55

      virtual_obstacle_layer:
        plugin: "my_virtual_obstacle_layer::VirtualObstacleLayer"
        enabled: true

      always_send_full_costmap: True

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: r1/odom
    robot_base_frame: r1_base_footprint
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.6
    min_rotational_vel: 0.3
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [2.0, 0.0, 1.0] #[0.75, 0.0, 1.3] #[0.5, 0.0, 0.6]
    min_velocity: [-2.0, 0.0, -1.0]
    max_accel: [0.5, 0.0, 1.0] #[2.5, 0.0, 3.2]
    max_decel: [-0.5, 0.0, -1.0] #[-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0